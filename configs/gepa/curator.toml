# GEPA prompt optimisation for the pretrain-data-curator environment.
# Goal: reduce verbose turn-1 preamble, improve finalization rate, raise viable rate.
# Use heuristic trainer (no GPU) for cheap optimization signal.

model            = "openai/gpt-4.1-mini"
reflection_model = "openai/gpt-4.1"

[[env]]
env_id   = "hunterj/pretrain-data-curator"

[env.args]
use_real_trainer = false
max_turns        = 10
candidate_limit  = 3
scan_limit       = 5

[gepa]
max_calls      = 150
num_train      = 20
num_val        = 10
minibatch_size = 3
max_concurrent = 8
perfect_score  = 1.0

[sampling]
max_tokens  = 2048
temperature = 0.7
