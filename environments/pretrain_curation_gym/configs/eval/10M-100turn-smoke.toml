# Native Verifiers v1 profile, migrated from pretrain-data-curator.
# Runtime and scoring timeout are derived from taskset.task.curator.proxy_student.
model = "deepseek/deepseek-v4-flash"
num_tasks = 1
num_rollouts = 1
max_concurrent = 1
max_turns = 100
verbose = true
rich = true
push = true

[sampling]
temperature = 0.6
top_p = 0.9
max_tokens = 8192

[taskset]
id = "pretrain-curation-gym"

[taskset.task]
hf_token_env = "HF_TOKEN"
manifest_filename = "manifest.json"
decon_binary = "decon"
decon_evals_dir = ""
decon_threshold = 0.2
screen_val_set = true

[taskset.task.curator]
cutoff_date = "2024-12-31"
token_budget = 10000000
candidate_limit = 64
allow_trace_id_manifest_fallback = false
allow_local_sources = true
max_local_source_bytes = 134217728
max_turns = 100
alpha_perf = 1.0
lambda_leakage = 1.0
perf_baseline_loss = 10.825839875788878
perf_target_loss = 3.28
perf_scaling_exponent = 2.0
baseline_relative_perf = true
max_concurrent_fetches = 8
max_concurrent_training = 1
fetch_timeout_seconds = 120.0
fetch_timeout_per_doc_seconds = 0.02
fetch_max_attempts = 5
use_real_trainer = true

[taskset.task.curator.proxy_student]
n_layer = 12
n_head = 6
n_embd = 768
mlp_ratio = 4
lm_head_softcap = 30.0
num_value_embeds = 3
attn_scale = 0.12
block_size = 1024
batch_size = 8
steps = 200
train_token_budget = 10000000
training_recipe = "speedrun_muon"
muon_lr = 0.023
muon_weight_decay = 0.05
muon_momentum_min = 0.85
muon_momentum_max = 0.95
muon_warmup_steps = 300
muon_cooldown_steps = 50
adam_lr = 0.008
adam_eps = 1e-10
adam_weight_decay = 0.005
embed_lr_mul = 1.0
lm_head_lr_mul = 1.0
value_embed_lr_mul = 75.0
scalar_lr_mul = 5.0
embed_wd_mul = 150.0
lm_head_wd_mul = 150.0
value_embed_wd_mul = 5.0
scalar_wd_mul = 0.0
adam_on_odd_steps = true
batch_schedule_enabled = true
batch_stage_fracs = [
    0.3333333333,
    0.3333333333,
    0.3333333334,
]
batch_stage_muls = [
    1,
    2,
    3,
]
lr_stage_muls = [
    1.0,
    1.52,
    1.73,
]
lr_cooldown_frac = 0.6
lr_cooldown_floor = 0.15
learning_rate = 0.0003
seed = 0
val_fraction = 0.1
weight_decay = 0.1
adam_beta1 = 0.9
adam_beta2 = 0.95
grad_clip = 1.0
warmup_steps = 256
lr_min_ratio = 0.1
n_train_runs = 1
runtime_backend = "docker"
docker_image = "webcurator-runtime:latest"
gpu_count = 1
cpu_cores = 8
memory_gb = 32
disk_size_gb = 40
max_corpus_chars = 100000000
timeout_minutes = 90
upload_timeout_seconds = 600.0

[taskset.task.curator.validation_set]
dataset_id = "kjj0/fineweb10B-gpt2"
filename = "fineweb_val_000000.bin"
repo_type = "dataset"
tokenizer = "gpt2"
val_tokens = 10485760

[harness]
id = "codex"
forward_env = ["HF_TOKEN"]

[harness.runtime]
type = "docker"
