# Single-step Hosted Training smoke for the native v1 environment.
# Publish this package as hunterj/pretrain-curation-gym before launching.
name = "pretrain-curation-gym-gpt20b-modal-1rollout"
model = "openai/gpt-oss-20b"
loss = "rl"

max_steps = 1
batch_size = 2
rollouts_per_example = 2
# A tiny batch may have zero centered advantage; let the smoke finish anyway.
post_batch_filters = []

[sampling]
max_tokens = 16384
temperature = 0.9

[[env]]
name = "pretrain-curation-gym"
max_turns = 64

[env.taskset]
id = "hunterj/pretrain-curation-gym"

[env.taskset.task]
manifest_filename = "manifest.json"

[env.taskset.task.curator]
token_budget = 500000
max_turns = 64
candidate_limit = 8
use_real_trainer = true

[env.taskset.task.curator.proxy_student]
runtime_backend = "modal"
modal_gpu = "L4"
train_token_budget = 40000

[env.harness]
id = "default"
