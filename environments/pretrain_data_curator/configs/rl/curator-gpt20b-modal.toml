# Benchmark-oriented hosted training run — gpt-oss-20b + Modal H100 proxy student
# max_turns=64 gives the agent enough turns to search, inspect, and refine.
# batch_size=4 × rollouts_per_example=2 = 8 rollouts; the single curator task is repeated across the batch.

name  = "pretrain-data-curator-gpt20b-modal"
model = "openai/gpt-oss-20b"
loss  = "rl"

max_steps            = 1
batch_size           = 4
rollouts_per_example = 2

[sampling]
max_tokens    = 65536   # 64 turns with room for longer discovery/refinement
temperature   = 0.9

[[env]]
id = "hunterj/pretrain-data-curator"

# text_field=null -> auto-detection (fixed in v0.3.0)
# Modal H100 keeps Hosted Training viable for benchmark-scale proxy training.
args.use_real_trainer          = true
args.max_turns                 = 64
args.token_budget              = 400_000_000
args.candidate_limit           = 32
args.sample_docs_per_source    = 50_000
args.max_concurrent_fetches    = 16
args.fetch_timeout_seconds     = 120.0
args.fetch_max_attempts        = 5

args.proxy_student.runtime_backend        = "modal"
args.proxy_student.modal_gpu              = "H100"
args.proxy_student.train_token_budget     = 400_000_000
args.proxy_student.upload_timeout_seconds = 1800.0
