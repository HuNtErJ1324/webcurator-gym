# Reference eval config listing every `pretrain-data-curator` configuration
# knob explicitly, at its current source default (see `load_environment` in
# pretrain_data_curator.py, `CuratorConfig`/`ProxyStudentConfig`/
# `ValidationSetConfig` in models.py and val_set.py). Values are written out
# rather than omitted so this file doubles as a live default-value reference;
# diff against the source if you suspect drift.
#
# This is not meant to be run as-is with the real trainer turned on — it uses
# the cheap HeuristicProxyTrainer (use_real_trainer = false). See
# configs/eval/nemotron-nano-docker.toml and docs/configuration.md for
# real-GPU-trainer (Docker/Modal) examples.
#
# Run with:
#   prime eval run configs/eval/example.toml
# or via the native v1 taskset command (see docs/configuration.md) for the
# Docker/Modal harness-runtime paths, which this wrapper cannot select.

[[eval]]
name = "pretrain-data-curator-example"
env_id = "pretrain-data-curator"
model = "openai/gpt-4.1-mini"
num_examples = 4
rollouts_per_example = 1

[eval.args]
# --- task -------------------------------------------------------------------
cutoff_date = "2024-12-31"          # latest allowed HF `lastModified`
token_budget = 1000000              # target mixture token budget (manifest default)
hf_token_env = "HF_TOKEN"           # env var checked before each rollout
candidate_limit = 8                 # trace-recovery fallback cap on synthesized sources
sample_docs_per_source = 64         # docs sampled per source for scoring
allow_local_sources = true          # permit workspace-relative text/JSONL sources
max_local_source_bytes = 33554432   # per-local-source runtime transfer cap
max_turns = 64                      # generous harness safety cap; not a scoring budget
harness_id = "bash"                 # compatible bundled Verifiers harness

# --- reward weights ----------------------------------------------------------
alpha_perf = 1.0                    # R = alpha_perf*Perf - lambda_cost*Cost - lambda_leakage*Leakage
lambda_cost = 0.1
lambda_leakage = 1.0

# --- baseline-relative Perf ---------------------------------------------------
perf_baseline_loss = 10.825839875788878  # ln(50304): uniform-vocab no-info CE constant
baseline_relative_perf = true            # Perf reward = bounded relative loss reduction vs baseline;
                                          # false uses exp(-loss) directly (only meaningful for tiny/toy loss)

# --- external-call robustness -------------------------------------------------
max_concurrent_fetches = 8
max_concurrent_training = 1
fetch_timeout_seconds = 30.0
fetch_timeout_per_doc_seconds = 0.25
fetch_max_attempts = 3

# --- proxy-student trainer ----------------------------------------------------
use_real_trainer = false            # false = deterministic CPU heuristic (no GPU or measured CE signal)

# eval_corpus overrides the default held-out leakage reference.
# When unset, the reference is built from the real validation-set token shard
# (kjj0/fineweb10B-gpt2 / fineweb_val_000000.bin) via LeakageReferenceLoader.
# Set explicitly to a list[str] to bypass the real val-set and use a static corpus.
# eval_corpus = ["..."]

[eval.args.proxy_student]
# Only consumed when use_real_trainer = true. Fixed GPT-2-scale student; only
# the training corpus is meant to vary between rollouts.
n_layer = 4
n_head = 4
n_embd = 256
mlp_ratio = 4
lm_head_softcap = 30.0
num_value_embeds = 3
block_size = 256
batch_size = 16
steps = 200                         # overridden by train_token_budget when set
# train_token_budget = 400000000    # None by default; set to scale steps/corpus-cap/timeout by token count
learning_rate = 3e-4
seed = 0
val_fraction = 0.1

# record_01 (nanogpt-speedrun) optimizer schedule + regularization
weight_decay = 0.1
adam_beta1 = 0.9
adam_beta2 = 0.95
adam_eps = 1e-8
grad_clip = 1.0
# warmup_steps left unset -> derives min(256, max(1, effective_steps // 10))
lr_min_ratio = 0.1
n_train_runs = 1

# backend selection: unset by default; "docker" | "modal" is required when
# use_real_trainer=true.
# runtime_backend = "modal"
# docker_host = "ssh://user@gpu-host"  # rejected for runtime_backend="docker"; unused by modal
modal_gpu = "L4"                     # only used by runtime_backend="modal": "L4" | "H100" | "H200" | "A100"
docker_image = "pytorch/pytorch:2.7.0-cuda12.6-cudnn9-runtime"  # shared docker/modal default
gpu_count = 1
cpu_cores = 4
memory_gb = 16
disk_size_gb = 20
# max_corpus_chars left unset -> derives from train_token_budget (floored at 5_000_000)
# timeout_minutes left unset -> derives from train_token_budget (floored at 30, capped at 1440 for modal)
upload_timeout_seconds = 120.0

[eval.args.validation_set]
# Held-out downstream-CE validation stream; consumed only by the real trainer.
# Defaults to the NanoGPT speedrun set (FineWeb sample-10BT GPT-2-BPE val tokens).
dataset_id = "kjj0/fineweb10B-gpt2"
filename = "fineweb_val_000000.bin"
repo_type = "dataset"
tokenizer = "gpt2"
val_tokens = 10485760
