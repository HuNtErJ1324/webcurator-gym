# Full-expressivity hosted evaluation: real GPT-2-scale proxy-student training
# on Modal (H100), generous turn/token budgets so the agent is never cut off
# mid-discovery or mid-refinement. Single task, single rollout.
#
# Run hosted (on-platform) with:
#   cd environments/pretrain_data_curator
#   uv run prime eval run configs/eval/full-expressivity-modal.toml --hosted --follow
# (requires MODAL_TOKEN_ID / MODAL_TOKEN_SECRET and HF_TOKEN set on the
# platform's hosted-eval secrets; see docs/configuration.md. `env_args`/
# `eval_name`/`timeout_minutes` are the hosted-mode field names — the local
# `prime eval run` mode instead uses `args`/`name`, see example.toml.)

[[eval]]
eval_name             = "pretrain-data-curator-full-expressivity-modal"
env_id                = "hunterj/pretrain-data-curator"
model                 = "openai/gpt-oss-20b"
num_examples          = 1
rollouts_per_example  = 1
max_tokens            = 65536
temperature           = 0.9
timeout_minutes       = 1440    # hosted-eval sandbox wall-clock ceiling (Modal's 24h max)
allow_sandbox_access  = true

[eval.env_args]
# --- task -------------------------------------------------------------------
cutoff_date            = "2024-12-31"
token_budget            = 400_000_000
hf_token_env            = "HF_TOKEN"
candidate_limit         = 128
sample_docs_per_source  = 100_000        # field ceiling (models.py: le=100_000)
max_turns               = 300            # generous safety cap, well under the 1000 ceiling

# --- reward weights ----------------------------------------------------------
alpha_perf    = 1.0
lambda_cost   = 0.1
lambda_leakage = 1.0

# --- baseline-relative Perf ---------------------------------------------------
perf_baseline_loss     = 10.826993292286894
baseline_relative_perf = true

# --- external-call robustness -------------------------------------------------
max_concurrent_fetches  = 16
max_concurrent_training = 1
fetch_timeout_seconds   = 120.0
fetch_max_attempts      = 5

# --- proxy-student trainer ----------------------------------------------------
use_real_trainer = true

[eval.env_args.proxy_student]
n_layer          = 4
n_head           = 4
n_embd           = 256
mlp_ratio        = 4
lm_head_softcap  = 30.0
num_value_embeds = 3
block_size       = 256
batch_size       = 16
learning_rate    = 3e-4
seed             = 0
val_fraction     = 0.1

weight_decay = 0.1
adam_beta1   = 0.9
adam_beta2   = 0.95
adam_eps     = 1e-8
grad_clip    = 1.0
lr_min_ratio = 0.1
n_train_runs = 1

runtime_backend        = "modal"
modal_gpu              = "H100"
docker_image           = "pytorch/pytorch:2.7.0-cuda12.6-cudnn9-runtime"
gpu_count              = 1
cpu_cores              = 8
memory_gb              = 32
disk_size_gb           = 40
train_token_budget      = 1_000_000_000  # _MAX_TRAIN_TOKEN_BUDGET ceiling (models.py)
timeout_minutes         = 1440           # Modal's 24h sandbox-lifetime ceiling
upload_timeout_seconds  = 1800.0

[eval.env_args.validation_set]
dataset_id = "kjj0/fineweb10B-gpt2"
filename   = "fineweb_val_000000.bin"
repo_type  = "dataset"
tokenizer  = "gpt2"
val_tokens = 10485760
