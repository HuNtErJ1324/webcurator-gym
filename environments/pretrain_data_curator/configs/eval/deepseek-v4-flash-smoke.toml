# Comprehensive local smoke: one DeepSeek rollout curates 25M tokens, then the
# real fixed proxy student trains and evaluates in the rollout-owned local GPU
# Docker container. Docker Engine with NVIDIA Container Toolkit required.
# Run from environments/pretrain_data_curator after sourcing the workspace-root
# secrets.env:
#   prime eval run configs/eval/deepseek-v4-flash-smoke.toml

env_dir_path = ".."                       # cwd is this environment; parent holds it

[[eval]]
name = "pretrain-data-curator-deepseek-v4-flash-smoke"
env_id = "pretrain-data-curator"         # ownerless => resolve this local package
model = "deepseek/deepseek-v4-flash"
num_examples = 1
rollouts_per_example = 1
max_concurrent = 1
max_tokens = 2048                         # bounded per turn for a responsive smoke
temperature = 0.2

[eval.args]
# Task and harness: token_budget is the sole agent-facing budget.
cutoff_date = "2024-12-31"
token_budget = 25_000_000
hf_token_env = "HF_TOKEN"
manifest_filename = "manifest.json"
candidate_limit = 64                     # trace-recovery fallback only
sample_docs_per_source = 100_000         # enough to fill 25M
allow_local_sources = true
max_local_source_bytes = 134_217_728     # 128 MiB per local source
max_turns = 64                           # harness safety cap, not reward input
harness_id = "bash"

# Reward coefficients and performance mapping.
alpha_perf = 1.0
lambda_leakage = 1.0
perf_baseline_loss = 10.825839875788878  # ln(50304)
perf_target_loss = 3.28                  # nanoGPT speedrun target
baseline_relative_perf = true

# External access and concurrency.
max_concurrent_fetches = 8
max_concurrent_training = 1
fetch_timeout_seconds = 120.0
fetch_timeout_per_doc_seconds = 0.02
fetch_max_attempts = 5

# Real held-out-CE trainer. Decon detects benchmark contamination against
# vendored public benchmark eval sets plus the held-out validation set
# (detokenised at scoring time into an ephemeral temp dir; cleaned up after).
use_real_trainer = true
decon_binary = "decon"
decon_evals_dir = ""
decon_threshold = 0.2
screen_val_set = true

[eval.args.proxy_student]
# Fixed student architecture.
n_layer = 4
n_head = 4
n_embd = 256
mlp_ratio = 4
lm_head_softcap = 30.0
num_value_embeds = 3

# Training schedule. train_token_budget overrides steps.
block_size = 256
batch_size = 16
steps = 200
train_token_budget = 25_000_000
learning_rate = 0.0003
seed = 0
val_fraction = 0.1
weight_decay = 0.1
adam_beta1 = 0.9
adam_beta2 = 0.95
adam_eps = 0.00000001
grad_clip = 1.0
warmup_steps = 256
lr_min_ratio = 0.1
n_train_runs = 1

# Local GPU Docker runtime. Requires Docker Engine with the NVIDIA Container
# Toolkit on the same machine. docker_host must be unset (None) — the shared
# harness-runtime Docker backend rejects a non-None value.
runtime_backend = "docker"
docker_image = "pytorch/pytorch:2.7.0-cuda12.6-cudnn9-runtime"
gpu_count = 1
cpu_cores = 8
memory_gb = 32
disk_size_gb = 40
max_corpus_chars = 100_000_000          # four chars per 25M-token allocation
timeout_minutes = 90
upload_timeout_seconds = 600.0

[eval.args.validation_set]
# Fixed held-out GPT-2-BPE validation stream used only by final scoring.
dataset_id = "kjj0/fineweb10B-gpt2"
filename = "fineweb_val_000000.bin"
repo_type = "dataset"
tokenizer = "gpt2"
val_tokens = 10_485_760
