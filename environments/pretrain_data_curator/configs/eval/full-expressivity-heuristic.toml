# Full-expressivity hosted evaluation: HEURISTIC (in-process, CPU) proxy-student
# scoring — no Modal/Docker GPU, no real training. Derived from
# full-expressivity-modal.toml with three deliberate changes:
#   * use_real_trainer = false   -> in-process heuristic trainer (runs cleanly,
#                                   needs no Docker/Modal harness runtime)
#   * lambda_cost      = 0.0     -> cost term dropped from the reward entirely
#   * token_budget     = 130M    -> a budget the agent's typical 2-source manifest
#                                   can actually fill (400M is structurally
#                                   unreachable: per-source fetch is hard-capped at
#                                   100k docs, so 2 sources x ~850 tok/doc ~= 170M).
#                                   At the prior run's observed ~852 tok/doc and a
#                                   0.6/0.4 split, 130M is token-target-bound (fully
#                                   reached), not doc-cap-bound.
#
# Run hosted (on-platform) with:
#   cd environments/pretrain_data_curator
#   uv run prime eval run configs/eval/full-expressivity-heuristic.toml --hosted --follow
# (requires HF_TOKEN available to the hosted sandbox; the heuristic trainer needs
# NO Modal creds. `env_args`/`eval_name`/`timeout_minutes` are the hosted-mode
# field names — see full-expressivity-modal.toml / docs/configuration.md.)

[[eval]]
eval_name             = "pretrain-data-curator-full-expressivity-heuristic"
env_id                = "hunterj/pretrain-data-curator"
model                 = "openai/gpt-oss-20b"
num_examples          = 1
rollouts_per_example  = 1
max_tokens            = 65536
temperature           = 0.9
timeout_minutes       = 360     # heuristic run: setup + HF fetch only, no GPU training
allow_sandbox_access  = true

[eval.env_args]
# --- task -------------------------------------------------------------------
cutoff_date            = "2024-12-31"
token_budget            = 130_000_000     # reachable target (see header); was 400M
hf_token_env            = "HF_TOKEN"
candidate_limit         = 128
sample_docs_per_source  = 100_000        # field ceiling (models.py: le=100_000)
max_turns               = 300            # generous safety cap, well under the 1000 ceiling

# --- reward weights ----------------------------------------------------------
alpha_perf    = 1.0
lambda_cost   = 0.0             # cost term dropped (was 0.1)
lambda_leakage = 1.0

# --- baseline-relative Perf ---------------------------------------------------
perf_baseline_loss     = 10.826993292286894
baseline_relative_perf = true

# --- external-call robustness -------------------------------------------------
max_concurrent_fetches  = 16
max_concurrent_training = 1
fetch_timeout_seconds   = 120.0
fetch_max_attempts      = 5

# --- proxy-student trainer ----------------------------------------------------
use_real_trainer = false        # in-process heuristic trainer (was true -> Modal)

[eval.env_args.proxy_student]
n_layer          = 4
n_head           = 4
n_embd           = 256
mlp_ratio        = 4
lm_head_softcap  = 30.0
num_value_embeds = 3
block_size       = 256
batch_size       = 16
learning_rate    = 3e-4
seed             = 0
val_fraction     = 0.1

weight_decay = 0.1
adam_beta1   = 0.9
adam_beta2   = 0.95
adam_eps     = 1e-8
grad_clip    = 1.0
lr_min_ratio = 0.1
n_train_runs = 1

# Runtime/sandbox fields below are IGNORED when use_real_trainer = false (the
# heuristic trainer runs in-process). Retained so the two configs stay diffable.
runtime_backend        = "modal"
modal_gpu              = "H100"
docker_image           = "pytorch/pytorch:2.7.0-cuda12.6-cudnn9-runtime"
gpu_count              = 1
cpu_cores              = 8
memory_gb              = 32
disk_size_gb           = 40
train_token_budget      = 1_000_000_000  # heuristic uses this for its data-scale term
timeout_minutes         = 1440
upload_timeout_seconds  = 1800.0

[eval.env_args.validation_set]
dataset_id = "kjj0/fineweb10B-gpt2"
filename   = "fineweb_val_000000.bin"
repo_type  = "dataset"
tokenizer  = "gpt2"
val_tokens = 10485760
